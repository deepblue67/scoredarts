<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Darts"/>
  <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png"/>
  <link rel="icon" href="./assets/icon.svg" type="image/svg+xml"/>
  <link rel="manifest" href="./manifest.json"/>
  <meta name="theme-color" content="#0d0f1a"/>
  <title>Darts</title>
  <script src="./vendor/react.production.min.js"></script>
  <script src="./vendor/react-dom.production.min.js"></script>
  <script src="./storage.js"></script>
  <script src="./scoring.js"></script>
  <script src="./ui.js"></script>
  <script src="./game01.js"></script>
  <script src="./game-cricket.js"></script>
  <script src="./game-around.js"></script>
  <script src="./app.js" defer></script>
  <style>

    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{overscroll-behavior:none}
    input,button{outline:none;font-family:Georgia,serif}
    @keyframes popIn   {0%{transform:scale(0.7);opacity:0}100%{transform:scale(1);opacity:1}}
    @keyframes burstIn {0%{transform:scale(0.5) rotate(-10deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
    @keyframes spinWin {0%{transform:rotate(0) scale(0.5)}100%{transform:rotate(720deg) scale(1)}}
    @keyframes slideUp {0%{transform:translateY(30px);opacity:0}100%{transform:translateY(0);opacity:1}}
    .pop-in  {animation:popIn   .2s ease both}
    .bust-in {animation:burstIn .3s ease both}
    .spin-win{animation:spinWin 1s  ease both}
    .slide-up{animation:slideUp .35s ease both}

    /* Base / fallback */
    .dartboard-svg { max-width:370px }
    .turn-history-summary{display:none}
    .turn-actions{width:100%}
    .opponent-score-strip{display:none}
    .dartboard-fullscreen-board .dartboard-svg{
      max-width:min(calc(100vw - 4px), calc(100vh - 76px)) !important;
      width:100% !important;
    }

    /* PC */
    @media (min-width:1367px){
      .game-layout{
        flex-direction:row !important;
        align-items:stretch !important;
        overflow:hidden !important;
        padding:0 !important;
        gap:0 !important;
      }
      .game-left{
        flex:0 0 420px !important;
        overflow-y:auto !important;
        padding:16px 18px !important;
        border-right:1px solid #465071;
        gap:12px;
      }
      .turn-history-summary{display:block}
      .turn-actions{margin-top:auto}
      .game-right{
        flex:1 !important;
        display:flex !important;
        align-items:center !important;
        justify-content:center !important;
        padding:18px !important;
      }
      .dartboard-svg{
        max-width:min(760px, calc(100vw - 480px), calc(100vh - 70px)) !important;
        width:100% !important;
      }
    }

    /* iPhone portrait */
    @media (max-width:767px) and (orientation:portrait){
      .dartboard-svg{max-width:min(370px, calc(100vw - 24px))}
      .score-panel{display:none !important}
      .active-turn-card{margin-top:0}
      .opponent-score-strip{display:flex !important}
    }

    /* iPhone paysage */
    @media (max-height:430px) and (orientation:landscape){
      .game-layout{
        flex-direction:row !important;
        align-items:stretch !important;
        overflow:hidden !important;
        padding:0 !important;
        gap:0 !important;
      }
      .game-left{
        flex:0 0 260px !important;
        overflow-y:auto !important;
        padding:6px 8px !important;
        border-right:1px solid #465071;
        gap:4px !important;
      }
      .turn-history-summary{display:block}
      .turn-actions{margin-top:auto}
      .score-panel{max-height:54px;overflow:hidden}
      .score-panel > div{padding:5px 4px !important;border-width:1px !important}
      .score-panel div{font-size:9px !important}
      .active-turn-card{padding:8px 10px !important}
      .miss-button{padding:7px 0 !important;font-size:12px !important}
      .turn-history-summary{padding:6px 8px !important;max-height:48px;overflow:hidden}
      .turn-history-summary div{font-size:10px !important}
      .action-buttons{gap:6px !important}
      .action-buttons button{padding:8px 0 !important;font-size:11px !important;border-radius:9px !important}
      .game-right{
        flex:1 !important;
        display:flex !important;
        align-items:center !important;
        justify-content:center !important;
        padding:6px !important;
      }
      .dartboard-svg{
        max-width:min(calc(100vw - 280px), calc(100vh - 20px)) !important;
        width:100% !important;
      }
    }

    /* iPad portrait */
    @media (min-width:768px) and (max-width:1024px) and (orientation:portrait){
      .dartboard-svg{max-width:580px}
    }

    /* iPad paysage */
    @media (min-width:768px) and (max-width:1366px) and (min-height:431px) and (orientation:landscape){
      .game-layout{
        flex-direction:row !important;
        align-items:stretch !important;
        overflow:hidden !important;
        padding:0 !important;
        gap:0 !important;
      }
      .game-left{
        flex:0 0 360px !important;
        overflow-y:auto !important;
        padding:12px 14px !important;
        border-right:1px solid #465071;
        gap:10px;
      }
      .turn-history-summary{display:block}
      .turn-actions{margin-top:auto}
      .game-right{
        flex:1 !important;
        display:flex !important;
        align-items:center !important;
        justify-content:center !important;
        padding:12px !important;
      }
      .dartboard-svg{
        max-width:min(calc(100vw - 400px), calc(100vh - 80px)) !important;
        width:100% !important;
      }
    }

    @media (orientation:landscape){
      .dartboard-fullscreen-board .dartboard-svg{
        max-width:min(calc(100vw - 16px), calc(100vh - 64px)) !important;
      }
    }

  </style>
</head>
<body>
<div id="root"></div>
<script>
window.addEventListener("error", function(event) {
  if (event.message === "Script error." && !event.filename) return;
  var root = document.getElementById("root");
  if (!root) return;
  var detail = String(event.message || event.error || "Erreur inconnue");
  if (event.filename) detail += "\n" + event.filename + ":" + event.lineno + ":" + event.colno;
  root.innerHTML = "<div style='font-family:sans-serif;padding:24px;color:#b00020'>" +
    "<h1 style='font-size:18px'>Erreur de chargement</h1>" +
    "<pre style='white-space:pre-wrap'>" + detail + "</pre>" +
    "</div>";
});

/* ── Service Worker registration ── */
if ("serviceWorker" in navigator) {
  var swRefreshing = false;
  navigator.serviceWorker.addEventListener("controllerchange", function() {
    if (swRefreshing) return;
    swRefreshing = true;
    window.location.reload();
  });

  function showUpdatePrompt(worker) {
    if (document.getElementById("sw-update-prompt")) return;
    var prompt = document.createElement("div");
    prompt.id = "sw-update-prompt";
    prompt.style.cssText = "position:fixed;left:12px;right:12px;bottom:12px;z-index:1200;" +
      "background:#181c2f;color:#f0f2ff;border:1px solid #465071;border-radius:12px;" +
      "box-shadow:0 8px 28px #0008;padding:12px 14px;font-family:Georgia,serif;" +
      "display:flex;gap:10px;align-items:center;justify-content:space-between";
    prompt.innerHTML = "<span style='font-size:13px'>Nouvelle version disponible.</span>" +
      "<button type='button' style='background:#f5a623;color:#000;border:0;border-radius:9px;" +
      "padding:9px 12px;font-weight:bold;font-family:Georgia,serif;cursor:pointer'>Mettre a jour</button>";
    prompt.querySelector("button").addEventListener("click", function() {
      worker.postMessage({ type: "SKIP_WAITING" });
    });
    document.body.appendChild(prompt);
  }

  window.addEventListener("load", function() {
    navigator.serviceWorker.register("./sw.js").then(function(reg) {
      if (reg.waiting) showUpdatePrompt(reg.waiting);
      /* Quand un nouveau SW est en attente, on recharge pour l'activer */
      reg.addEventListener("updatefound", function() {
        var newWorker = reg.installing;
        if (newWorker) {
          newWorker.addEventListener("statechange", function() {
            if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
              /* Nouveau SW installé → reload silencieux pour appliquer le cache frais */
              showUpdatePrompt(newWorker);
            }
          });
        }
      });
    }).catch(function(err) {
      console.warn("SW registration failed:", err);
    });
  });
}
</script>

</body>
</html>
