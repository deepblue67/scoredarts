  <title>🎯 Darts 301</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #0d0f1a; overscroll-behavior: none; }
    input, button { outline: none; font-family: Georgia, serif; }
    @keyframes popIn { 0%{transform:scale(0.7);opacity:0} 100%{transform:scale(1);opacity:1} }
    @keyframes burstIn { 0%{transform:scale(0.5) rotate(-10deg);opacity:0} 100%{transform:scale(1) rotate(0deg);opacity:1} }
    @keyframes spinWin { 0%{transform:rotate(0deg) scale(0.5)} 100%{transform:rotate(720deg) scale(1)} }
    @keyframes fadeSlideUp { 0%{transform:translateY(30px);opacity:0} 100%{transform:translateY(0);opacity:1} }
    .pop-in   { animation: popIn       0.2s ease both; }
    .bust-in  { animation: burstIn     0.3s ease both; }
    .spin-win { animation: spinWin     1s   ease both; }
    .slide-up { animation: fadeSlideUp 0.35s ease both; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

var useState    = React.useState;
var useCallback = React.useCallback;
var useEffect   = React.useEffect;

/* ── Constantes ─────────────────────────────────────────────────── */
var STARTING_SCORE = 301;
var MAX_THROWS     = 3;
var SEGMENTS       = [20,1,18,4,13,6,10,15,2,17,3,19,7,16,8,11,14,9,12,5];
var TEAM_COLORS    = ["#e84545","#4e9af1","#27c96f","#f5a623"];
var SAVE_KEY       = "darts301_savedGame";

var C = {
  bg:"#0d0f1a", surface:"#161928", card:"#1e2236", border:"#2a2f4a",
  accent:"#f5a623", accentDim:"#b87d18",
  green:"#27c96f", red:"#e84545", blue:"#4e9af1",
  text:"#f0f2ff", muted:"#7b82a8",
  dartRed:"#cc2222", dartGreen:"#1a6b3a", dartBlack:"#111", dartCream:"#f5f0e0"
};

/* ── Sauvegarde / Chargement ─────────────────────────────────────── */
function saveGame(state) {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); } catch(e) {}
}
function loadSavedGame() {
  try {
    var raw = localStorage.getItem(SAVE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}
function clearSavedGame() {
  try { localStorage.removeItem(SAVE_KEY); } catch(e) {}
}

/* ── Cible SVG ───────────────────────────────────────────────────── */
function DartBoard(props) {
  var onScore  = props.onScore;
  var disabled = props.disabled;
  var cx = 200, cy = 200;
  var R = { bullseye:12, bull:28, innerSingle:96, triple:108, outerSingle:160, double:172, board:190 };
  var SEG_ANGLE = 18;
  function toRad(d) { return d * Math.PI / 180; }
  function arcPath(r1, r2, startDeg, endDeg) {
    var s=toRad(startDeg-90), e=toRad(endDeg-90);
    var x1=cx+r1*Math.cos(s),y1=cy+r1*Math.sin(s);
    var x2=cx+r2*Math.cos(s),y2=cy+r2*Math.sin(s);
    var x3=cx+r2*Math.cos(e),y3=cy+r2*Math.sin(e);
    var x4=cx+r1*Math.cos(e),y4=cy+r1*Math.sin(e);
    return "M"+x1+" "+y1+" A"+r1+" "+r1+" 0 0 1 "+x4+" "+y4+" L"+x3+" "+y3+" A"+r2+" "+r2+" 0 0 0 "+x2+" "+y2+"Z";
  }
  function labelPos(r, deg) {
    var rad=toRad(deg-90);
    return {x:cx+r*Math.cos(rad), y:cy+r*Math.sin(rad)};
  }
  var fa=useState(null); var flash=fa[0]; var setFlash=fa[1];
  function hit(value, multiplier, zone) {
    if (disabled) return;
    setFlash(zone);
    setTimeout(function(){setFlash(null);}, 350);
    var lbl = multiplier===3?"T"+value : multiplier===2?"D"+value : ""+value;
    onScore({value:value, multiplier:multiplier, score:value*multiplier, label:lbl});
  }
  return (
    <svg viewBox="0 0 400 400" style={{width:"100%",maxWidth:370,display:"block",margin:"0 auto",filter:"drop-shadow(0 6px 24px #000b)",touchAction:"none"}}>
      <circle cx={cx} cy={cy} r={R.board+8} fill="#1a1108"/>
      <circle cx={cx} cy={cy} r={R.board}   fill="#0d0d0d"/>
      {SEGMENTS.map(function(num,i){
        var startDeg=i*SEG_ANGLE-SEG_ANGLE/2, endDeg=startDeg+SEG_ANGLE;
        var even=i%2===0, base=even?C.dartBlack:C.dartCream, ring=even?C.dartRed:C.dartGreen;
        var zones=[
          {r1:R.bull,r2:R.innerSingle,mult:1,col:base,zone:"s-"+num},
          {r1:R.innerSingle,r2:R.triple,mult:3,col:ring,zone:"t-"+num},
          {r1:R.triple,r2:R.outerSingle,mult:1,col:base,zone:"o-"+num},
          {r1:R.outerSingle,r2:R.double,mult:2,col:ring,zone:"d-"+num}
        ];
        return zones.map(function(z){
          var hi=flash===z.zone;
          return (<path key={z.zone} d={arcPath(z.r1,z.r2,startDeg,endDeg)} fill={hi?C.accent:z.col} stroke="#1a1a1a" strokeWidth={0.6} style={{cursor:disabled?"default":"pointer",transition:"fill 0.12s"}} onClick={function(){hit(num,z.mult,z.zone);}}/>);
        });
      })}
      {SEGMENTS.map(function(num,i){
        var pos=labelPos(R.board-11,i*SEG_ANGLE);
        return (<text key={"n"+num} x={pos.x} y={pos.y} textAnchor="middle" dominantBaseline="middle" fontSize={11} fontWeight="bold" fill={C.dartCream} fontFamily="monospace" style={{pointerEvents:"none",userSelect:"none"}}>{num}</text>);
      })}
      <circle cx={cx} cy={cy} r={R.bull} fill={flash==="bull25"?C.accent:C.dartGreen} stroke="#333" strokeWidth={1} style={{cursor:disabled?"default":"pointer",transition:"fill 0.12s"}} onClick={function(){hit(25,1,"bull25");}}/>
      <circle cx={cx} cy={cy} r={R.bullseye} fill={flash==="bull50"?C.accent:C.dartRed} stroke="#222" strokeWidth={1} style={{cursor:disabled?"default":"pointer",transition:"fill 0.12s"}} onClick={function(){hit(50,1,"bull50");}}/>
      <text x={cx} y={cy} textAnchor="middle" dominantBaseline="middle" fontSize={8} fontWeight="bold" fill="#fff" fontFamily="monospace" style={{pointerEvents:"none",userSelect:"none"}}>50</text>
      {disabled && <rect x={0} y={0} width={400} height={400} fill="rgba(0,0,0,0.45)" style={{cursor:"default"}}/>}
    </svg>
  );
}

/* ── Points de lancer ────────────────────────────────────────────── */
function ThrowDots(props) {
  var throws=props.throws, max=props.max;
  return (
    <div style={{display:"flex",gap:8}}>
      {Array.from({length:max}).map(function(_,i){
        var t=throws[i];
        return (<div key={i} className={t?"pop-in":""} style={{width:40,height:38,borderRadius:9,background:t?C.card:"transparent",border:"2px solid "+(t?C.accent:C.border),display:"flex",alignItems:"center",justifyContent:"center",color:t?C.accent:C.muted,fontSize:(t&&t.label.length>3)?10:12,fontWeight:"bold"}}>{t?t.label:""}</div>);
      })}
    </div>
  );
}

/* ── Panneau des scores ──────────────────────────────────────────── */
function ScorePanel(props) {
  var teams=props.teams, currentIdx=props.currentIdx;
  return (
    <div style={{display:"flex",gap:8,width:"100%"}}>
      {teams.map(function(team,i){
        var active=i===currentIdx, col=TEAM_COLORS[i];
        return (
          <div key={team.id} style={{flex:1,background:active?C.card:C.surface,border:"2px solid "+(active?col:C.border),borderRadius:12,padding:"10px 8px",textAlign:"center",transition:"all 0.3s",boxShadow:active?"0 0 14px "+col+"44":"none"}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:col,margin:"0 auto 5px"}}/>
            <div style={{color:active?C.text:C.muted,fontSize:10,letterSpacing:1,textTransform:"uppercase",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginBottom:3}}>{team.name}</div>

/* ── Écran de jeu ────────────────────────────────────────────────── */
function GameScreen(props) {
  var initialTeams=props.initialTeams, onNewGame=props.onNewGame, savedState=props.savedState;

  function buildInitial() {
    if (savedState) return savedState;
    return {
      teams:     initialTeams.map(function(t){return {id:t.id,name:t.name,score:STARTING_SCORE};}),
      currentIdx:0, throws:[], history:[],
      stats:{rounds:0,totalThrows:0,bestTurn:null}, winner:null
    };
  }

  var init = buildInitial();
  var s1=useState(init.teams);           var teams=s1[0],setTeams=s1[1];
  var s2=useState(init.currentIdx);      var currentIdx=s2[0],setCurrentIdx=s2[1];
  var s3=useState(init.throws);          var throws=s3[0],setThrows=s3[1];
  var s4=useState(init.history);         var history=s4[0],setHistory=s4[1];
  var s5=useState(false);                var bust=s5[0],setBust=s5[1];
  var s6=useState(null);                 var bustPending=s6[0],setBustPending=s6[1];
  var s7=useState(init.winner);          var winner=s7[0],setWinner=s7[1];
  var s8=useState(false);                var showHistory=s8[0],setShowHistory=s8[1];
  var s9=useState(false);                var showConfirm=s9[0],setShowConfirm=s9[1];
  var s10=useState(init.stats);          var stats=s10[0],setStats=s10[1];

  var team=teams[currentIdx];
  var roundTotal=throws.reduce(function(s,t){return s+t.score;},0);
  var projected=team.score-roundTotal;

  /* Sauvegarde automatique à chaque changement d'état */
  useEffect(function(){
    if(!winner){
      saveGame({teams:teams,currentIdx:currentIdx,throws:throws,history:history,stats:stats,winner:null,initialTeams:initialTeams});
    } else {
      clearSavedGame();
    }
  },[teams,currentIdx,throws,history,stats,winner]);

  function commitTurn(th,isWin){
    var total=th.reduce(function(s,t){return s+t.score;},0);
    var ns=team.score-total;
    var updated=teams.map(function(t){return t.id===team.id?{id:t.id,name:t.name,score:ns<0?0:ns}:t;});
    setTeams(updated);
    setHistory(function(h){return h.concat([{teamId:team.id,teamName:team.name,throws:th,total:total,bust:false,scoreBefore:team.score,scoreAfter:ns}]);});
    setStats(function(s){var best=s.bestTurn===null?total:(total>s.bestTurn?total:s.bestTurn);return {rounds:s.rounds+1,totalThrows:s.totalThrows+th.length,bestTurn:best};});
    setThrows([]);
    if(isWin){setWinner(team);}else{setCurrentIdx(function(i){return (i+1)%teams.length;});}
  }

  function handleScore(throwData){
    if(throws.length>=MAX_THROWS) return;
    var newThrows=throws.concat([throwData]);
    setThrows(newThrows);
    var total=newThrows.reduce(function(s,t){return s+t.score;},0);
    var ns=team.score-total;
    if(ns<0){setBustPending(newThrows);setBust(true);}
    else if(ns===0){commitTurn(newThrows,true);}
  }

  function handleBustDone(){
    setBust(false);
    var bp=bustPending||[];
    setHistory(function(h){return h.concat([{teamId:team.id,teamName:team.name,throws:bp,total:0,bust:true,scoreBefore:team.score,scoreAfter:team.score}]);});
    setStats(function(s){return {rounds:s.rounds+1,totalThrows:s.totalThrows+bp.length,bestTurn:s.bestTurn};});
    setBustPending(null);setThrows([]);
    setCurrentIdx(function(i){return (i+1)%teams.length;});
  }

  function undoLast(){if(throws.length>0&&!bust){setThrows(function(t){return t.slice(0,t.length-1);});}}

  function handleValidateTurn(){
    if(!turnComplete) return;
    setShowConfirm(true);
  }

  function handleConfirm(){setShowConfirm(false);commitTurn(throws,false);}

  function resetGame(){
    clearSavedGame();
    setTeams(initialTeams.map(function(t){return {id:t.id,name:t.name,score:STARTING_SCORE};}));
    setCurrentIdx(0);setThrows([]);setHistory([]);setWinner(null);
    setStats({rounds:0,totalThrows:0,bestTurn:null});
  }

  if(winner){return <WinScreen winner={winner} stats={stats} onRestart={resetGame} onNewGame={onNewGame}/>;}

  var boardDisabled=throws.length>=MAX_THROWS||bust;
  var canUndo=throws.length>0&&!bust;
  var turnComplete=throws.length>=MAX_THROWS&&!bust;

  return (
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",fontFamily:"Georgia,serif",paddingBottom:"env(safe-area-inset-bottom, 16px)"}}>
      <div style={{background:C.surface,borderBottom:"1px solid "+C.border,padding:"12px 16px",paddingTop:"max(12px, env(safe-area-inset-top, 12px))",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <button onClick={onNewGame} style={{background:"none",border:"none",color:C.muted,fontSize:13,cursor:"pointer",letterSpacing:1}}>✕ Quitter</button>
        <div style={{color:C.accent,fontSize:16,fontWeight:"bold",letterSpacing:3,textTransform:"uppercase",textShadow:"0 0 10px "+C.accent+"77"}}>🎯 DARTS 301</div>
        <button onClick={function(){setShowHistory(true);}} style={{background:"none",border:"none",color:C.muted,fontSize:13,cursor:"pointer"}}>Historique</button>
      </div>
      <div style={{flex:1,padding:"12px 14px",display:"flex",flexDirection:"column",gap:10,overflow:"hidden"}}>
        <ScorePanel teams={teams} currentIdx={currentIdx}/>
        <div style={{background:C.surface,borderRadius:13,padding:"12px 14px",border:"1px solid "+C.border}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div>
              <div style={{color:TEAM_COLORS[currentIdx],fontSize:13,fontWeight:"bold",letterSpacing:1,textTransform:"uppercase"}}>{team.name}</div>
              <div style={{color:C.muted,fontSize:11,marginTop:1}}>{"Lancer "+throws.length+"/"+MAX_THROWS}{turnComplete&&<span style={{color:C.accent,marginLeft:6}}>✓ Prêt à valider</span>}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{color:projected<0?C.red:projected===0?C.green:C.text,fontSize:26,fontWeight:"bold",fontFamily:"monospace",transition:"color 0.2s"}}>{projected<0?"BUST!":projected}</div>
              {roundTotal>0&&projected>=0&&<div style={{color:C.accent,fontSize:11}}>{"−"+roundTotal+" pts"}</div>}
            </div>
          </div>
          <ThrowDots throws={throws} max={MAX_THROWS}/>
        </div>
        <div style={{flex:1,display:"flex",alignItems:"center",minHeight:0}}>
          <DartBoard onScore={handleScore} disabled={boardDisabled}/>
        </div>
        {!boardDisabled && (
          <button onClick={function(){handleScore({value:0,multiplier:1,score:0,label:"0"});}} style={{width:"100%",background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:"11px 0",color:C.muted,fontSize:14,cursor:"pointer",letterSpacing:2,fontFamily:"Georgia,serif"}}>🎯 Raté — 0 point</button>
        )}
        <div style={{display:"flex",gap:10}}>
          <button onClick={undoLast} disabled={!canUndo} style={{flex:1,background:canUndo?C.card:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:"14px 0",color:canUndo?C.text:C.muted,fontSize:14,cursor:canUndo?"pointer":"default",letterSpacing:1,fontFamily:"Georgia,serif",transition:"all 0.2s"}}>↩ Annuler</button>
          <button onClick={handleValidateTurn} disabled={!turnComplete} style={{flex:1.6,background:turnComplete?"linear-gradient(135deg,"+C.green+",#1a9450)":C.surface,border:"1px solid "+(turnComplete?C.green:C.border),borderRadius:12,padding:"14px 0",color:turnComplete?"#fff":C.muted,fontSize:14,fontWeight:"bold",cursor:turnComplete?"pointer":"default",letterSpacing:1,fontFamily:"Georgia,serif",boxShadow:turnComplete?"0 0 16px "+C.green+"55":"none",transition:"all 0.3s"}}>{turnComplete?"✓ Confirmer →":"Valider tour →"}</button>
        </div>
      </div>
      <BustOverlay show={bust} onDone={handleBustDone}/>
      {showConfirm&&<ConfirmModal team={team} teamIdx={currentIdx} throws={throws} projected={projected} onConfirm={handleConfirm} onCancel={function(){setShowConfirm(false);}}/>}
      {showHistory&&<HistoryDrawer history={history} teams={teams} onClose={function(){setShowHistory(false);}}/>}
    </div>
  );
}

  return (

      </div>
      <div style={{display:"flex",gap:12,flexWrap:"wrap",justifyContent:"center"}}>
        <button onClick={onNewGame} style={{background:C.card,border:"1px solid "+C.border,borderRadius:12,padding:"14px 24px",color:C.muted,fontSize:14,cursor:"pointer",fontFamily:"Georgia,serif"}}>Nouvelle partie</button>
        <button onClick={onResume} style={{background:"linear-gradient(135deg,"+C.accent+","+C.accentDim+")",border:"none",borderRadius:12,padding:"14px 28px",color:"#000",fontSize:15,fontWeight:"bold",cursor:"pointer",letterSpacing:1,fontFamily:"Georgia,serif",boxShadow:"0 4px 14px "+C.accent+"55"}}>▶ Reprendre</button>
      </div>
    </div>
  );
}

/* ── Racine ──────────────────────────────────────────────────────── */
function App() {
  var saved = loadSavedGame();

  var s1=useState(saved?"resume":"setup"); var screen=s1[0],setScreen=s1[1];
  var s2=useState(null); var gameTeams=s2[0],setGameTeams=s2[1];
  var s3=useState(saved); var savedState=s3[0],setSavedState=s3[1];

  if(screen==="resume"&&savedState){
    return <ResumeScreen
      saved={savedState}
      onResume={function(){
        setGameTeams(savedState.initialTeams||savedState.teams.map(function(t){return {id:t.id,name:t.name};}));
        setScreen("game");
      }}
      onNewGame={function(){
        clearSavedGame();setSavedState(null);setScreen("setup");
      }}
    />;
  }
  if(screen==="setup"){
    return <SetupScreen onStart={function(teams){
      clearSavedGame();setSavedState(null);
      setGameTeams(teams);setScreen("game");
    }}/>;
  }
  return <GameScreen
    initialTeams={gameTeams}
    savedState={screen==="game"&&savedState?savedState:null}
    onNewGame={function(){clearSavedGame();setSavedState(null);setGameTeams(null);setScreen("setup");}}
  />;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App,null));
</script>
</body>
</html>
