  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>

    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{overscroll-behavior:none}
    input,button{outline:none;font-family:Georgia,serif}
    @keyframes popIn   {0%{transform:scale(0.7);opacity:0}100%{transform:scale(1);opacity:1}}
    @keyframes burstIn {0%{transform:scale(0.5) rotate(-10deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
    @keyframes spinWin {0%{transform:rotate(0) scale(0.5)}100%{transform:rotate(720deg) scale(1)}}
    @keyframes slideUp {0%{transform:translateY(30px);opacity:0}100%{transform:translateY(0);opacity:1}}
    .pop-in  {animation:popIn   .2s ease both}
    .bust-in {animation:burstIn .3s ease both}
    .spin-win{animation:spinWin 1s  ease both}
    .slide-up{animation:slideUp .35s ease both}

    /* ── iPhone portrait : défaut ── */
    .dartboard-svg { max-width:370px }

    /* ── iPad portrait ── */
    @media (min-width:768px) and (max-width:1024px) and (orientation:portrait){
      .dartboard-svg{max-width:580px}
    }

    /* ── iPad paysage : cible occupe toute la droite ── */
    @media (min-width:1024px) and (orientation:landscape){
      .game-layout{
        flex-direction:row !important;
        align-items:stretch !important;
        overflow:hidden !important;
        padding:0 !important;
        gap:0 !important;
      }
      .game-left{
        flex:0 0 360px !important;
        overflow-y:auto !important;
        padding:12px 14px !important;
        border-right:1px solid #2a2f4a;
        gap:10px;
      }
      .game-right{
        flex:1 !important;
        display:flex !important;
        align-items:center !important;
        justify-content:center !important;
        padding:12px !important;
      }
      .dartboard-svg{
        max-width:min(calc(100vw - 400px), calc(100vh - 80px)) !important;
        width:100% !important;
      }
    }

    /* ── iPhone paysage ── */
    @media (max-height:430px) and (orientation:landscape){
      .game-layout{
        flex-direction:row !important;
        align-items:stretch !important;
        overflow:hidden !important;
        padding:0 !important;
        gap:0 !important;
      }
      .game-left{
        flex:0 0 260px !important;
        overflow-y:auto !important;
        padding:8px 10px !important;
        border-right:1px solid #2a2f4a;
        gap:6px;
      }
      .game-right{
        flex:1 !important;
        display:flex !important;
        align-items:center !important;
        justify-content:center !important;
        padding:6px !important;
      }
      .dartboard-svg{
        max-width:min(calc(100vw - 280px), calc(100vh - 20px)) !important;
        width:100% !important;
      }
    }

  </style>

if ("serviceWorker" in navigator) {
  window.addEventListener("load", function() {
    navigator.serviceWorker.register("./sw.js").then(function(reg) {
      /* Quand un nouveau SW est en attente, on recharge pour l'activer */
      reg.addEventListener("updatefound", function() {
        var newWorker = reg.installing;
        if (newWorker) {
          newWorker.addEventListener("statechange", function() {
            if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
              /* Nouveau SW installé → reload silencieux pour appliquer le cache frais */
              window.location.reload();
            }
          });
        }
      });
    }).catch(function(err) {
      console.warn("SW registration failed:", err);
    });
  });
}
</script>

/* ══ DARTBOARD ═══════════════════════════════════════════════════ */
function DartBoard(props){
  var onScore=props.onScore, disabled=props.disabled, C=props.C;
  var highlightSectors=props.highlightSectors||null;
  var cx=200,cy=200;
  var R={bullseye:12,bull:28,innerSingle:96,triple:108,outerSingle:160,double:172,board:190};
  var SEG=18;
  function rad(d){return d*Math.PI/180;}
  function arc(r1,r2,s,e){
    var sa=rad(s-90),ea=rad(e-90);
    var x1=cx+r1*Math.cos(sa),y1=cy+r1*Math.sin(sa);
    var x2=cx+r2*Math.cos(sa),y2=cy+r2*Math.sin(sa);
    var x3=cx+r2*Math.cos(ea),y3=cy+r2*Math.sin(ea);
    var x4=cx+r1*Math.cos(ea),y4=cy+r1*Math.sin(ea);
    return "M"+x1+" "+y1+" A"+r1+" "+r1+" 0 0 1 "+x4+" "+y4+" L"+x3+" "+y3+" A"+r2+" "+r2+" 0 0 0 "+x2+" "+y2+"Z";
  }
  function lp(r,d){var a=rad(d-90);return{x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)};}
  var fA=useState(null);var flash=fA[0],setFlash=fA[1];
  function hit(v,m,z){
    if(disabled)return;
    setFlash(z);setTimeout(function(){setFlash(null);},350);
    var lbl=m===3?"T"+v:m===2?"D"+v:v===25?"Bull":v===50?"Bull":""+v;
    onScore({value:v,multiplier:m,score:v*m,label:lbl,isDouble:m===2,isBull:(v===50||v===25)});
  }
  function op(num){
    if(!highlightSectors)return 1;
    return highlightSectors.indexOf(num)>=0?1:0.25;
  }
  return(
    <svg viewBox="0 0 400 400" className="dartboard-svg"
      style={{width:"100%",display:"block",margin:"0 auto",
        filter:"drop-shadow(0 6px 24px #000b)",touchAction:"none"}}>
      <circle cx={cx} cy={cy} r={R.board+8} fill="#1a1108"/>
      <circle cx={cx} cy={cy} r={R.board} fill="#0d0d0d"/>
      {SEGMENTS.map(function(num,i){
        var sd=i*SEG-SEG/2,ed=sd+SEG;
        var ev=i%2===0,base=ev?C.dartBlack:C.dartCream,ring=ev?C.dartRed:C.dartGreen;
        var o=op(num);
        var zones=[
          {r1:R.bull,r2:R.innerSingle,m:1,c:base,z:"s-"+num},
          {r1:R.innerSingle,r2:R.triple,m:3,c:ring,z:"t-"+num},
          {r1:R.triple,r2:R.outerSingle,m:1,c:base,z:"o-"+num},
          {r1:R.outerSingle,r2:R.double,m:2,c:ring,z:"d-"+num}
        ];
        return zones.map(function(z){
          return(<path key={z.z} d={arc(z.r1,z.r2,sd,ed)}
            fill={flash===z.z?C.accent:z.c} stroke="#1a1a1a" strokeWidth={0.6} opacity={o}
            style={{cursor:disabled?"default":"pointer",transition:"fill 0.12s"}}
            onClick={function(){hit(num,z.m,z.z);}}/>);
        });
      })}
      {SEGMENTS.map(function(num,i){
        var p=lp(R.board-11,i*SEG);
        return(<text key={"n"+num} x={p.x} y={p.y} textAnchor="middle" dominantBaseline="middle"
          fontSize={11} fontWeight="bold" fill={C.dartCream} fontFamily="monospace" opacity={op(num)}
          style={{pointerEvents:"none",userSelect:"none"}}>{num}</text>);
      })}
      <circle cx={cx} cy={cy} r={R.bull} fill={flash==="bull25"?C.accent:C.dartGreen}
        stroke="#333" strokeWidth={1} opacity={op(25)}
        style={{cursor:disabled?"default":"pointer",transition:"fill 0.12s"}}
        onClick={function(){hit(25,1,"bull25");}}/>
      <circle cx={cx} cy={cy} r={R.bullseye} fill={flash==="bull50"?C.accent:C.dartRed}
        stroke="#222" strokeWidth={1} opacity={op(25)}
        style={{cursor:disabled?"default":"pointer",transition:"fill 0.12s"}}
        onClick={function(){hit(50,1,"bull50");}}/>
      <text x={cx} y={cy} textAnchor="middle" dominantBaseline="middle"
        fontSize={8} fontWeight="bold" fill="#fff" fontFamily="monospace"
        style={{pointerEvents:"none",userSelect:"none"}}>50</text>
      {disabled&&<rect x={0} y={0} width={400} height={400} fill="rgba(0,0,0,0.45)" style={{cursor:"default"}}/>}
    </svg>
  );
}

/* ══ CRICKET PANEL ═══════════════════════════════════════════════ */
function CricketPanel(props){
  var teams=props.teams,currentIdx=props.currentIdx,cs=props.cricketState,C=props.C;
  function hIcon(n){
    if(n===0)return"";if(n===1)return"/";if(n===2)return"X";return"⊗";
  }
  return(
    <div style={{background:C.surface,borderRadius:12,border:"1px solid "+C.border,overflow:"hidden"}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr repeat("+teams.length+",1fr) 1fr",
        background:C.card,padding:"6px 8px",gap:4}}>
        <div style={{color:C.muted,fontSize:10,textAlign:"center",letterSpacing:1}}>SEC</div>
        {teams.map(function(t,i){
          var active=i===currentIdx;
          return(<div key={t.id} style={{color:active?TEAM_COLORS[i]:C.muted,fontSize:10,
            textAlign:"center",letterSpacing:1,fontWeight:active?"bold":"normal",
            overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.name}</div>);
        })}
        <div style={{color:C.muted,fontSize:10,textAlign:"center"}}>PTS</div>
      </div>
      {CRICKET_SECTORS.map(function(sec){
        var label=sec===25?"Bull":""+sec;
        return(
          <div key={sec} style={{display:"grid",
            gridTemplateColumns:"1fr repeat("+teams.length+",1fr) 1fr",
            padding:"5px 8px",gap:4,borderBottom:"1px solid "+C.border+"88"}}>
            <div style={{color:C.text,fontSize:13,fontWeight:"bold",textAlign:"center",fontFamily:"monospace"}}>{label}</div>
            {teams.map(function(t,i){
              var hits=(cs[t.id]&&cs[t.id][sec])||0,closed=hits>=3,active=i===currentIdx;
              return(<div key={t.id} style={{textAlign:"center",
                color:closed?TEAM_COLORS[i]:active?C.text:C.muted,
                fontSize:closed?16:14,fontWeight:"bold",
                textShadow:closed?"0 0 8px "+TEAM_COLORS[i]+"88":"none"}}>

              </div>);
            })}
            <div style={{display:"flex",justifyContent:"center",gap:4}}>
              {teams.map(function(t,i){
                var pts=(cs[t.id]&&cs[t.id]["pts_"+sec])||0;
                return pts>0?(<span key={t.id} style={{color:TEAM_COLORS[i],fontSize:11,
                  fontFamily:"monospace",fontWeight:"bold"}}>{pts}</span>):null;
              })}
            </div>
          </div>
        );
      })}
      <div style={{display:"grid",gridTemplateColumns:"1fr repeat("+teams.length+",1fr) 1fr",
        padding:"8px 8px",background:C.card,gap:4}}>
        <div style={{color:C.muted,fontSize:10,textAlign:"center"}}>TOT</div>
        {teams.map(function(t,i){
          var active=i===currentIdx;
          var total=Object.keys(cs[t.id]||{}).reduce(function(s,k){
            return k.indexOf("pts_")===0?s+(cs[t.id][k]||0):s;
          },0);
          return(<div key={t.id} style={{color:active?TEAM_COLORS[i]:C.muted,
            fontSize:16,fontWeight:"bold",textAlign:"center",fontFamily:"monospace",
            textShadow:active?"0 0 8px "+TEAM_COLORS[i]+"88":"none"}}>{total}</div>);
        })}
        <div/>
      </div>
    </div>
  );
}

/* ══ SETUP SCREEN ════════════════════════════════════════════════ */
function SetupScreen(props){
  var onStart=props.onStart,onBack=props.onBack,gameType=props.gameType,C=props.C;
  var is301or501=gameType==="301"||gameType==="501";
  var savedTeams=ls_get(TEAMS_KEY)||[{id:1,name:"Équipe Rouge"},{id:2,name:"Équipe Bleue"}];
  var initNextId=savedTeams.reduce(function(m,t){return t.id>m?t.id:m;},0)+1;
  var tA=useState(savedTeams);var teams=tA[0],setTeams=tA[1];
  var tB=useState(initNextId);var nextId=tB[0],setNextId=tB[1];
  var tC=useState("simple");var rule=tC[0],setRule=tC[1];

  function addTeam(){
    if(teams.length>=8)return;
    var nid=nextId;
    setTeams(function(a){return a.concat([{id:nid,name:"Équipe "+nid}]);});
    setNextId(function(n){return n+1;});
  }
  function removeTeam(id){
    if(teams.length<=2)return;
    setTeams(function(a){return a.filter(function(x){return x.id!==id;});});
  }
  function updateName(id,val){
    setTeams(function(a){return a.map(function(x){return x.id===id?{id:x.id,name:val}:x;});});
  }
  function handleStart(){ls_set(TEAMS_KEY,teams);onStart(teams,rule);}

  var gameLabel=gameType==="cricket"?"🏏 Cricket":"🎯 "+gameType;
  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",
      alignItems:"center",justifyContent:"center",padding:20,fontFamily:"Georgia,serif"}}>
      <div style={{position:"absolute",top:"max(16px,env(safe-area-inset-top,16px))",left:16}}>
        <button onClick={onBack}
          style={{background:"none",border:"none",color:C.muted,fontSize:14,cursor:"pointer"}}>
          ← Retour
        </button>
      </div>
      <div style={{marginBottom:24,textAlign:"center"}}>
        <div style={{fontSize:48,marginBottom:6}}>{gameType==="cricket"?"🏏":"🎯"}</div>
        <h1 style={{color:C.accent,fontSize:28,fontWeight:"bold",letterSpacing:4,margin:0,
          textTransform:"uppercase"}}>{gameLabel}</h1>
      </div>
      <div style={{width:"100%",maxWidth:400,background:C.surface,borderRadius:16,
        padding:22,border:"1px solid "+C.border,marginBottom:12}}>
        <h2 style={{color:C.text,fontSize:15,marginBottom:14,letterSpacing:2,textTransform:"uppercase"}}>
          {"Équipes ("+teams.length+")"}
        </h2>
        {teams.map(function(team,i){
          return(
            <div key={team.id}
              draggable={true}
              onDragStart={function(e){e.dataTransfer.setData("dragId",""+team.id);}}
              onDragOver={function(e){e.preventDefault();}}
              onDrop={function(e){
                e.preventDefault();
                var fromId=parseInt(e.dataTransfer.getData("dragId"));
                if(fromId===team.id)return;
                setTeams(function(arr){
                  var from=arr.findIndex(function(x){return x.id===fromId;});
                  var to=arr.findIndex(function(x){return x.id===team.id;});
                  var next=arr.slice();
                  var moved=next.splice(from,1)[0];
                  next.splice(to,0,moved);
                  return next;
                });
              }}
              onTouchStart={function(e){
                var el=e.currentTarget;
                el._startY=e.touches[0].clientY;
                el._startIdx=i;
              }}
              onTouchMove={function(e){
                e.preventDefault();
                var dy=e.touches[0].clientY-e.currentTarget._startY;
                e.currentTarget.style.transform="translateY("+dy+"px)";
                e.currentTarget.style.opacity="0.7";
                e.currentTarget.style.zIndex="10";
              }}
              onTouchEnd={function(e){
                var el=e.currentTarget;
                el.style.transform="";el.style.opacity="1";el.style.zIndex="";
                var dy=e.changedTouches[0].clientY-el._startY;
                var rowH=(el.offsetHeight||58)+10;
                var steps=Math.round(dy/rowH);
                if(steps===0)return;
                setTeams(function(arr){
                  var from=arr.findIndex(function(x){return x.id===team.id;});
                  var to=Math.max(0,Math.min(arr.length-1,from+steps));
                  if(from===to)return arr;
                  var next=arr.slice();
                  var moved=next.splice(from,1)[0];
                  next.splice(to,0,moved);
                  return next;
                });
              }}
              style={{display:"flex",alignItems:"center",gap:10,marginBottom:10,
                transition:"opacity 0.15s",userSelect:"none",WebkitUserSelect:"none",
                position:"relative"}}>
              <div style={{color:C.muted,fontSize:20,cursor:"grab",flexShrink:0,
                padding:"0 2px",touchAction:"none"}}>⠿</div>
              <div style={{width:10,height:10,borderRadius:"50%",background:TEAM_COLORS[i],flexShrink:0}}/>
              <input value={team.name}
                onChange={function(e){updateName(team.id,e.target.value);}}
                style={{flex:1,background:C.inputBg,border:"1px solid "+C.border,borderRadius:8,
                  padding:"10px 12px",color:C.text,fontSize:15,fontFamily:"Georgia,serif"}}/>
              {teams.length>2&&
                <button onClick={function(){removeTeam(team.id);}}
                  style={{background:"none",border:"none",color:C.muted,fontSize:20,
                    cursor:"pointer",padding:"0 4px"}}>✕</button>
              }
            </div>
          );
        })}
        {teams.length<8&&
          <button onClick={addTeam}
            style={{width:"100%",marginTop:6,background:C.inputBg,border:"1px dashed "+C.border,
              borderRadius:8,padding:"10px 12px",color:C.muted,fontSize:13,
              cursor:"pointer",letterSpacing:1,fontFamily:"Georgia,serif"}}>
            + Ajouter une équipe
          </button>
        }
      </div>
      {is301or501&&(
        <div style={{width:"100%",maxWidth:400,background:C.surface,borderRadius:16,
          padding:18,border:"1px solid "+C.border,marginBottom:12}}>
          <h3 style={{color:C.text,fontSize:13,marginBottom:12,letterSpacing:2,textTransform:"uppercase"}}>
            Règle de fin
          </h3>
          <div style={{display:"flex",gap:8}}>
            {[{val:"simple",label:"Simple out",desc:"Terminer à exactement 0"},
              {val:"doubleout",label:"Double out",desc:"Finir sur une double ou Bull"}].map(function(r){
              var active=rule===r.val;
              return(<div key={r.val} onClick={function(){setRule(r.val);}}
                style={{flex:1,background:active?C.card:C.inputBg,
                  border:"2px solid "+(active?C.accent:C.border),
                  borderRadius:10,padding:"12px 10px",textAlign:"center",cursor:"pointer",transition:"all 0.2s"}}>
                <div style={{color:active?C.accent:C.text,fontSize:13,fontWeight:"bold",marginBottom:4}}>{r.label}</div>
                <div style={{color:C.muted,fontSize:11}}>{r.desc}</div>
              </div>);
            })}
          </div>
        </div>
      )}
      <div style={{width:"100%",maxWidth:400,background:C.surface,borderRadius:16,
        padding:18,border:"1px solid "+C.border,marginBottom:24}}>
        <h3 style={{color:C.accent,fontSize:12,marginBottom:10,letterSpacing:2,textTransform:"uppercase"}}>
          Règles {gameLabel}
        </h3>
        {is301or501?(
          <div style={{color:C.muted,fontSize:13,lineHeight:1.8}}>
            <div>{"• Départ à "}<strong style={{color:C.text}}>{gameType} points</strong>{" par équipe"}</div>
            <div>{"• "}<strong style={{color:C.text}}>3 lancers</strong>{" par tour"}</div>
            <div>{"• Atteindre "}<strong style={{color:C.green}}>exactement 0</strong>{" pour gagner"}</div>
            {rule==="doubleout"&&<div style={{color:C.accent}}>{"• Finir sur une "}<strong>double</strong>{" ou le Bull"}</div>}
            <div>{"• Dépasser 0 = "}<strong style={{color:C.red}}>Bust !</strong></div>
          </div>
        ):(
          <div style={{color:C.muted,fontSize:13,lineHeight:1.8}}>
            <div>{"• Secteurs : "}<strong style={{color:C.text}}>15, 16, 17, 18, 19, 20, Bull</strong></div>
            <div>{"• Fermer = "}<strong style={{color:C.text}}>3 touches</strong>{" (S=1, D=2, T=3)"}</div>
            <div>{"• Secteur fermé = points si l'adversaire n'a pas encore fermé"}</div>
            <div>{"• Gagner = tous fermés "}<strong style={{color:C.green}}>ET</strong>{" score le plus élevé"}</div>
          </div>
        )}
      </div>
      <button onClick={handleStart}
        style={{background:"linear-gradient(135deg,"+C.accent+","+C.accentDim+")",
          border:"none",borderRadius:14,padding:"18px 56px",color:"#000",fontSize:17,
          fontWeight:"bold",cursor:"pointer",letterSpacing:3,textTransform:"uppercase",
          boxShadow:"0 4px 18px "+C.accent+"55",fontFamily:"Georgia,serif"}}>
        Jouer !
      </button>
    </div>
  );
}

/* ══ GAME LAYOUT WRAPPER ══════════════════════════════════════════
   iPad paysage : left=colonne contrôles, right=cible plein écran
   Autres formats : colonne unique
════════════════════════════════════════════════════════════════════ */
function GameLayout(props){
  var leftContent=props.leftContent;
  var boardContent=props.boardContent;
  var C=props.C;
  return(
    <div className="game-layout" style={{flex:1,display:"flex",flexDirection:"column",
      overflow:"hidden"}}>
      <div className="game-left" style={{display:"flex",flexDirection:"column",gap:10,
        padding:"12px 14px"}}>
        {leftContent}
      </div>
      <div className="game-right" style={{flex:1,display:"flex",alignItems:"center",
        justifyContent:"center",padding:"8px"}}>
        {boardContent}
      </div>
    </div>
  );
}

/* ══ GAME 301/501 ════════════════════════════════════════════════ */
function Game301(props){
  var initialTeams=props.initialTeams,onNewGame=props.onNewGame;
  var savedState=props.savedState,rule=props.rule,C=props.C,gameType=props.gameType||"301";
  var startScore=gameType==="501"?501:301;

  function buildInit(){
    if(savedState)return savedState;
    return{teams:initialTeams.map(function(t){return{id:t.id,name:t.name,score:startScore};}),
      currentIdx:0,throws:[],history:[],
      stats:{rounds:0,totalThrows:0,bestTurn:null},winner:null,rule:rule,gameType:gameType};
  }
  var init=buildInit();
  var effectiveRule=init.rule||rule||"simple";

  var s1=useState(init.teams);      var teams=s1[0],setTeams=s1[1];
  var s2=useState(init.currentIdx); var currentIdx=s2[0],setCurrentIdx=s2[1];
  var s3=useState(init.throws);     var throws=s3[0],setThrows=s3[1];
  var s4=useState(init.history);    var history=s4[0],setHistory=s4[1];
  var s5=useState(false);           var bust=s5[0],setBust=s5[1];
  var s6=useState(null);            var bustPend=s6[0],setBustPend=s6[1];
  var s7=useState(init.winner);     var winner=s7[0],setWinner=s7[1];
  var s8=useState(false);           var showHist=s8[0],setShowHist=s8[1];
  var s9=useState(false);           var showConf=s9[0],setShowConf=s9[1];
  var s10=useState(init.stats);     var stats=s10[0],setStats=s10[1];
  var s11=useState(false);          var showQuit=s11[0],setShowQuit=s11[1];
  var s12=useState(false);          var showStats=s12[0],setShowStats=s12[1];

  var team=teams[currentIdx];
  var roundTotal=throws.reduce(function(s,t){return s+t.score;},0);
  var projected=team.score-roundTotal;
  var boardDisabled=throws.length>=MAX_THROWS||bust;
  var canUndo=throws.length>0&&!bust;
  var turnComplete=throws.length>=MAX_THROWS&&!bust;
  var checkoutHint=projected>0&&projected<=170&&projected in CHECKOUT&&throws.length===0?CHECKOUT[projected]:null;

  useEffect(function(){
    if(!winner){
      ls_set(SAVE_KEY,{teams:teams,currentIdx:currentIdx,throws:throws,history:history,
        stats:stats,winner:null,initialTeams:initialTeams,rule:effectiveRule,gameType:gameType});
    }else{ls_del(SAVE_KEY);}
  },[teams,currentIdx,throws,history,stats,winner]);

  function isValidFinish(th){
    if(effectiveRule==="simple")return true;
    var last=th[th.length-1];
    return last&&(last.isDouble||(last.value===50&&last.multiplier===1));
  }

  function saveToHistory(w){
    var existing=ls_get(HISTORY_KEY)||[];
    var now=new Date();
    existing.push({
      date:now.toLocaleDateString("fr-FR")+" "+now.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}),
      winner:w.name,rule:effectiveRule,gameType:gameType,totalThrows:stats.totalThrows,
      teams:teams.map(function(t){return{name:t.name,score:t.score,
        avgPerTurn:stats.rounds>0?(startScore/Math.max(1,stats.totalThrows)*3).toFixed(1):null,
        bestTurn:stats.bestTurn};})
    });
    ls_set(HISTORY_KEY,existing);
  }

  function commitTurn(th,isWin){
    var total=th.reduce(function(s,t){return s+t.score;},0);
    var ns=team.score-total;
    setTeams(teams.map(function(t){return t.id===team.id?{id:t.id,name:t.name,score:ns<0?0:ns}:t;}));
    setHistory(function(h){return h.concat([{teamId:team.id,teamName:team.name,
      throws:th,total:total,bust:false,scoreBefore:team.score,scoreAfter:ns}]);});
    setStats(function(s){var best=s.bestTurn===null?total:Math.max(s.bestTurn,total);
      return{rounds:s.rounds+1,totalThrows:s.totalThrows+th.length,bestTurn:best};});
    setThrows([]);
    if(isWin){saveToHistory(team);setWinner(team);}
    else{setCurrentIdx(function(i){return(i+1)%teams.length;});}
  }

  function handleScore(td){
    if(throws.length>=MAX_THROWS)return;
    var nt=throws.concat([td]);
    setThrows(nt);
    var total=nt.reduce(function(s,t){return s+t.score;},0);
    var ns=team.score-total;
    if(ns<0){setBustPend(nt);setBust(true);}
    else if(ns===0){if(isValidFinish(nt)){commitTurn(nt,true);}else{setBustPend(nt);setBust(true);}}
  }

  function handleBustDone(){
    setBust(false);var bp=bustPend||[];
    setHistory(function(h){return h.concat([{teamId:team.id,teamName:team.name,
      throws:bp,total:0,bust:true,scoreBefore:team.score,scoreAfter:team.score}]);});
    setStats(function(s){return{rounds:s.rounds+1,totalThrows:s.totalThrows+bp.length,bestTurn:s.bestTurn};});
    setBustPend(null);setThrows([]);
    setCurrentIdx(function(i){return(i+1)%teams.length;});
  }

  function undoLast(){if(canUndo)setThrows(function(t){return t.slice(0,t.length-1);});}
  function passTurn(){if(throws.length===0&&!bust)setCurrentIdx(function(i){return(i+1)%teams.length;});}

  function resetGame(){
    ls_del(SAVE_KEY);
    setTeams(initialTeams.map(function(t){return{id:t.id,name:t.name,score:startScore};}));
    setCurrentIdx(0);setThrows([]);setHistory([]);setWinner(null);
    setStats({rounds:0,totalThrows:0,bestTurn:null});
  }

  if(showStats)return <StatsScreen C={C} onClose={function(){setShowStats(false);}}/>;
  if(winner)return <WinScreen winner={winner} stats={stats} gameType={gameType} C={C}
    onRestart={function(){ls_del(SAVE_KEY);onNewGame();}}
    onNewGame={function(){ls_del(SAVE_KEY);onNewGame();}}
    onSameTeams={resetGame}/>;

  var leftContent=(
    <React.Fragment>
      <ScorePanel teams={teams} currentIdx={currentIdx} C={C}/>
      <div style={{background:C.surface,borderRadius:13,padding:"12px 14px",border:"1px solid "+C.border}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div>
            <div style={{color:TEAM_COLORS[currentIdx],fontSize:13,fontWeight:"bold",
              letterSpacing:1,textTransform:"uppercase"}}>{team.name}</div>
            <div style={{color:C.muted,fontSize:11,marginTop:1}}>
              {"Lancer "+throws.length+"/"+MAX_THROWS}
              {turnComplete&&<span style={{color:C.accent,marginLeft:6}}>✓ Prêt à valider</span>}
            </div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{color:projected<0?C.red:projected===0?C.green:C.text,
              fontSize:26,fontWeight:"bold",fontFamily:"monospace",transition:"color 0.2s"}}>
              {projected<0?"BUST!":projected}
            </div>
            {roundTotal>0&&projected>=0&&<div style={{color:C.accent,fontSize:11}}>{"−"+roundTotal+" pts"}</div>}
          </div>
        </div>
        <ThrowDots throws={throws} max={MAX_THROWS} C={C}/>
        {checkoutHint&&(
          <div style={{marginTop:10,background:C.card,borderRadius:8,padding:"8px 12px",
            display:"flex",alignItems:"center",gap:8,border:"1px solid "+C.accent+"44"}}>
            <span style={{fontSize:14}}>💡</span>
            <div>
              <div style={{color:C.accent,fontSize:10,letterSpacing:1,textTransform:"uppercase"}}>Checkout suggéré</div>
              <div style={{color:C.text,fontSize:13,fontWeight:"bold",fontFamily:"monospace"}}>{checkoutHint}</div>
            </div>
          </div>
        )}
        {effectiveRule==="doubleout"&&projected>0&&projected<=40&&projected%2===0&&throws.length===MAX_THROWS-1&&(
          <div style={{marginTop:8,color:C.accent,fontSize:11,textAlign:"center",fontStyle:"italic"}}>
            {"⚠️ Double out requis — visez D"+(projected/2)}
          </div>
        )}
      </div>
      {!boardDisabled&&(
        <button onClick={function(){handleScore({value:0,multiplier:1,score:0,label:"0",isDouble:false,isBull:false});}}
          style={{width:"100%",background:C.surface,border:"1px solid "+C.border,
            borderRadius:12,padding:"11px 0",color:C.muted,fontSize:14,
            cursor:"pointer",letterSpacing:2,fontFamily:"Georgia,serif"}}>
          🎯 Raté — 0 point
        </button>
      )}
      <ActionButtons canUndo={canUndo} onUndo={undoLast}
        canPass={throws.length===0&&!bust} onPass={passTurn}
        turnComplete={turnComplete} onValidate={function(){if(turnComplete)setShowConf(true);}}
        C={C}/>
    </React.Fragment>
  );

  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",
      fontFamily:"Georgia,serif",paddingBottom:"env(safe-area-inset-bottom,16px)"}}>
      <div style={{background:C.headerBg,borderBottom:"1px solid "+C.border,
        padding:"12px 16px",paddingTop:"max(12px,env(safe-area-inset-top,12px))",
        display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <button onClick={function(){setShowQuit(true);}}
          style={{background:"none",border:"none",color:C.muted,fontSize:13,cursor:"pointer"}}>✕ Quitter</button>
        <button onClick={function(){setShowStats(true);}}
          style={{background:"none",border:"none",color:C.accent,fontSize:14,fontWeight:"bold",
            cursor:"pointer",letterSpacing:2}}>🎯 {gameType.toUpperCase()}</button>
        <button onClick={function(){setShowHist(true);}}
          style={{background:"none",border:"none",color:C.muted,fontSize:13,cursor:"pointer"}}>Historique</button>
      </div>
      <GameLayout C={C}
        leftContent={leftContent}
        boardContent={<DartBoard onScore={handleScore} disabled={boardDisabled} C={C}/>}
      />
      <BustOverlay show={bust} onDone={handleBustDone} C={C}/>
      {showQuit&&<QuitModal onCancel={function(){setShowQuit(false);}} onConfirm={onNewGame} C={C}/>}
      {showConf&&<ConfirmModal team={team} teamIdx={currentIdx} throws={throws}
        projected={projected} C={C}
        onConfirm={function(){setShowConf(false);commitTurn(throws,false);}}
        onCancel={function(){setShowConf(false);}}/>}
      {showHist&&<HistoryDrawer history={history} teams={teams} onClose={function(){setShowHist(false);}} C={C}/>}
    </div>
  );
}

/* ══ GAME CRICKET ════════════════════════════════════════════════ */
function GameCricket(props){
  var initialTeams=props.initialTeams,onNewGame=props.onNewGame,savedState=props.savedState,C=props.C;

  function buildInitCricket(){
    if(savedState)return savedState;
    var cs={};
    initialTeams.forEach(function(t){
      cs[t.id]={};
      CRICKET_SECTORS.forEach(function(s){cs[t.id][s]=0;cs[t.id]["pts_"+s]=0;});
    });
    return{teams:initialTeams.map(function(t){return{id:t.id,name:t.name};}),
      currentIdx:0,throws:[],history:[],cricketState:cs,
      stats:{rounds:0,totalThrows:0,bestTurn:null},winner:null,gameType:"cricket"};
  }
  var init=buildInitCricket();

  var s1=useState(init.teams);         var teams=s1[0],setTeams=s1[1];
  var s2=useState(init.currentIdx);    var currentIdx=s2[0],setCurrentIdx=s2[1];
  var s3=useState(init.throws);        var throws=s3[0],setThrows=s3[1];
  var s4=useState(init.history);       var history=s4[0],setHistory=s4[1];
  var s5=useState(init.cricketState);  var cs=s5[0],setCs=s5[1];
  var s6=useState(init.winner);        var winner=s6[0],setWinner=s6[1];
  var s7=useState(false);              var showHist=s7[0],setShowHist=s7[1];
  var s8=useState(init.stats);         var stats=s8[0],setStats=s8[1];
  var s9=useState(false);              var showQuit=s9[0],setShowQuit=s9[1];
  var s10=useState(false);             var showStats=s10[0],setShowStats=s10[1];

  var team=teams[currentIdx];
  var boardDisabled=throws.length>=MAX_THROWS;
  var canUndo=throws.length>0;
  var turnComplete=throws.length>=MAX_THROWS;

  function teamTotalInState(state,teamId){
    return Object.keys(state[teamId]||{}).reduce(function(s,k){
      return k.indexOf("pts_")===0?s+(state[teamId][k]||0):s;
    },0);
  }
  function allClosedInState(state,teamId){
    return CRICKET_SECTORS.every(function(s){return(state[teamId][s]||0)>=3;});
  }
  function checkWin(newCs){
    for(var ti=0;ti<teams.length;ti++){
      var t=teams[ti];
      if(!allClosedInState(newCs,t.id))continue;
      var myTotal=teamTotalInState(newCs,t.id);
      var isWinner=teams.every(function(ot){return ot.id===t.id||teamTotalInState(newCs,ot.id)<=myTotal;});
      if(isWinner)return t;
    }
    return null;
  }

  useEffect(function(){
    if(!winner){
      ls_set(SAVE_KEY,{teams:teams,currentIdx:currentIdx,throws:throws,history:history,
        cricketState:cs,stats:stats,winner:null,initialTeams:initialTeams,gameType:"cricket"});
    }else{ls_del(SAVE_KEY);}
  },[teams,currentIdx,throws,history,cs,stats,winner]);

  function handleScore(td){
    if(throws.length>=MAX_THROWS)return;
    setThrows(throws.concat([td]));
  }

  function commitCricketTurn(th){
    var newCs=JSON.parse(JSON.stringify(cs));
    th.forEach(function(td){
      var val=td.value===50?25:td.value;
      if(CRICKET_SECTORS.indexOf(val)<0)return;
      var hits=td.multiplier;
      var current=newCs[team.id][val]||0;
      if(current>=3){
        var anyOpen=teams.some(function(t){return t.id!==team.id&&(newCs[t.id][val]||0)<3;});
        if(anyOpen)newCs[team.id]["pts_"+val]=(newCs[team.id]["pts_"+val]||0)+val*hits;
      }else{
        var newHits=current+hits;
        if(newHits>=3){
          newCs[team.id][val]=3;
          var excess=newHits-3;
          if(excess>0){
            var anyOpen2=teams.some(function(t){return t.id!==team.id&&(newCs[t.id][val]||0)<3;});
            if(anyOpen2)newCs[team.id]["pts_"+val]=(newCs[team.id]["pts_"+val]||0)+val*excess;
          }
        }else{newCs[team.id][val]=newHits;}
      }
    });
    setCs(newCs);
    setHistory(function(h){return h.concat([{teamId:team.id,teamName:team.name,throws:th,total:0,bust:false}]);});
    setStats(function(s){return{rounds:s.rounds+1,totalThrows:s.totalThrows+th.length,bestTurn:s.bestTurn};});
    setThrows([]);
    var w=checkWin(newCs);
    if(w){
      var existing=ls_get(HISTORY_KEY)||[];
      var now=new Date();
      existing.push({
        date:now.toLocaleDateString("fr-FR")+" "+now.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}),
        winner:w.name,gameType:"cricket",totalThrows:stats.totalThrows+th.length,
        teams:teams.map(function(t){return{name:t.name,score:teamTotalInState(newCs,t.id)};})
      });
      ls_set(HISTORY_KEY,existing);
      setWinner(w);
    }else{setCurrentIdx(function(i){return(i+1)%teams.length;});}
  }

  function undoLast(){if(canUndo)setThrows(function(t){return t.slice(0,t.length-1);});}
  function passTurn(){if(throws.length===0)setCurrentIdx(function(i){return(i+1)%teams.length;});}

  function resetGame(){
    ls_del(SAVE_KEY);
    var newCs={};
    initialTeams.forEach(function(t){
      newCs[t.id]={};
      CRICKET_SECTORS.forEach(function(s){newCs[t.id][s]=0;newCs[t.id]["pts_"+s]=0;});
    });
    setTeams(initialTeams.map(function(t){return{id:t.id,name:t.name};}));
    setCs(newCs);setCurrentIdx(0);setThrows([]);setHistory([]);setWinner(null);
    setStats({rounds:0,totalThrows:0,bestTurn:null});
  }

  if(showStats)return <StatsScreen C={C} onClose={function(){setShowStats(false);}}/>;
  if(winner)return <WinScreen winner={winner} stats={stats} gameType="cricket" C={C}
    onRestart={function(){ls_del(SAVE_KEY);onNewGame();}}
    onNewGame={function(){ls_del(SAVE_KEY);onNewGame();}}
    onSameTeams={resetGame}/>;

  var openSectors=CRICKET_SECTORS.filter(function(s){return(cs[team.id][s]||0)<3;});

  var leftContent=(
    <React.Fragment>
      <CricketPanel teams={teams} currentIdx={currentIdx} cricketState={cs} C={C}/>
      <div style={{background:C.surface,borderRadius:13,padding:"10px 14px",border:"1px solid "+C.border}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div>
            <div style={{color:TEAM_COLORS[currentIdx],fontSize:13,fontWeight:"bold",
              letterSpacing:1,textTransform:"uppercase"}}>{team.name}</div>
            <div style={{color:C.muted,fontSize:11,marginTop:1}}>
              {"Lancer "+throws.length+"/"+MAX_THROWS}
              {turnComplete&&<span style={{color:C.accent,marginLeft:6}}>✓ Prêt à valider</span>}
            </div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{color:C.text,fontSize:13,fontFamily:"monospace"}}>
              {openSectors.length===0?"Tous fermés !":openSectors.map(function(s){return s===25?"Bull":s;}).join(" · ")}
            </div>
            <div style={{color:C.muted,fontSize:10}}>à fermer</div>
          </div>
        </div>
        <ThrowDots throws={throws} max={MAX_THROWS} C={C}/>
      </div>
      {!boardDisabled&&(
        <button onClick={function(){handleScore({value:0,multiplier:1,score:0,label:"0",isDouble:false,isBull:false});}}
          style={{width:"100%",background:C.surface,border:"1px solid "+C.border,
            borderRadius:12,padding:"11px 0",color:C.muted,fontSize:14,
            cursor:"pointer",letterSpacing:2,fontFamily:"Georgia,serif"}}>
          🎯 Raté — 0 point
        </button>
      )}
      <ActionButtons canUndo={canUndo} onUndo={undoLast}
        canPass={throws.length===0} onPass={passTurn}
        turnComplete={turnComplete} onValidate={function(){if(turnComplete)commitCricketTurn(throws);}}
        C={C}/>
    </React.Fragment>
  );

  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",
      fontFamily:"Georgia,serif",paddingBottom:"env(safe-area-inset-bottom,16px)"}}>
      <div style={{background:C.headerBg,borderBottom:"1px solid "+C.border,
        padding:"12px 16px",paddingTop:"max(12px,env(safe-area-inset-top,12px))",
        display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <button onClick={function(){setShowQuit(true);}}
          style={{background:"none",border:"none",color:C.muted,fontSize:13,cursor:"pointer"}}>✕ Quitter</button>
        <button onClick={function(){setShowStats(true);}}
          style={{background:"none",border:"none",color:C.accent,fontSize:14,fontWeight:"bold",cursor:"pointer",letterSpacing:2}}>
          🏏 CRICKET
        </button>
        <button onClick={function(){setShowHist(true);}}
          style={{background:"none",border:"none",color:C.muted,fontSize:13,cursor:"pointer"}}>Historique</button>
      </div>
      <GameLayout C={C}
        leftContent={leftContent}
        boardContent={<DartBoard onScore={handleScore} disabled={boardDisabled} C={C}
          highlightSectors={openSectors.length>0?CRICKET_SECTORS:null}/>}
      />
      {showQuit&&<QuitModal onCancel={function(){setShowQuit(false);}} onConfirm={onNewGame} C={C}/>}
      {showHist&&<HistoryDrawer history={history} teams={teams} onClose={function(){setShowHist(false);}} C={C}/>}
    </div>
  );
}

/* ══ RESUME SCREEN ═══════════════════════════════════════════════ */

          style={{background:C.card,border:"1px solid "+C.border,borderRadius:12,

          Nouvelle partie
        </button>
        <button onClick={onResume}
          style={{background:"linear-gradient(135deg,"+C.accent+","+C.accentDim+")",
            border:"none",borderRadius:12,padding:"14px 28px",color:"#000",fontSize:15,
            fontWeight:"bold",cursor:"pointer",letterSpacing:1,fontFamily:"Georgia,serif",
            boxShadow:"0 4px 14px "+C.accent+"55"}}>▶ Reprendre</button>
      </div>
    </div>
  );
}

/* ══ APP ROOT ════════════════════════════════════════════════════ */
function App(){
  var saved=ls_get(SAVE_KEY);
  var isDark=ls_get(THEME_KEY);
  if(isDark===null)isDark=true;

  var b1=useState(saved?"resume":"home"); var screen=b1[0],setScreen=b1[1];
  var b2=useState(null);                  var gameTeams=b2[0],setGameTeams=b2[1];
  var b3=useState(saved);                 var savedSt=b3[0],setSavedSt=b3[1];
  var b4=useState(null);                  var gameRule=b4[0],setGameRule=b4[1];
  var b5=useState(!!isDark);              var darkMode=b5[0],setDarkMode=b5[1];
  var b6=useState(null);                  var gameType=b6[0],setGameType=b6[1];
  var b7=useState(false);                 var showStats=b7[0],setShowStats=b7[1];
  var b8=useState(false);                 var showSettings=b8[0],setShowSettings=b8[1];

  var C=makeTheme(darkMode);
  useEffect(function(){document.body.style.background=C.bg;},[darkMode]);

  function goHome(){ls_del(SAVE_KEY);setSavedSt(null);setGameTeams(null);setScreen("home");}

  if(showStats)return <StatsScreen C={C} onClose={function(){setShowStats(false);}}/>;
  if(showSettings)return <SettingsScreen C={C} darkMode={darkMode} setDarkMode={setDarkMode} onClose={function(){setShowSettings(false);}}/>;

  if(screen==="resume"&&savedSt){
    return <ResumeScreen C={C} saved={savedSt}
      onResume={function(){
        setGameTeams(savedSt.initialTeams||savedSt.teams.map(function(t){return{id:t.id,name:t.name};}));
        setGameRule(savedSt.rule||"simple");
        setGameType(savedSt.gameType||"301");
        setScreen("game");
      }}
      onNewGame={function(){ls_del(SAVE_KEY);setSavedSt(null);setScreen("home");}}/>;
  }
  if(screen==="home"){
    return <HomeScreen C={C} darkMode={darkMode} setDarkMode={setDarkMode}
      onShowStats={function(){setShowStats(true);}}
      onShowSettings={function(){setShowSettings(true);}}
      onSelect={function(type){setGameType(type);setScreen("setup");}}/>;
  }
  if(screen==="setup"){
    return <SetupScreen C={C} gameType={gameType}
      onBack={function(){setScreen("home");}}
      onStart={function(teams,rule){
        ls_del(SAVE_KEY);setSavedSt(null);
        setGameTeams(teams);setGameRule(rule);setScreen("game");
      }}/>;
  }
  if(screen==="game"&&gameTeams){
    var savedForGame=savedSt&&savedSt.gameType===(gameType||"301")?savedSt:null;
    if(gameType==="cricket"){
      return <GameCricket C={C} initialTeams={gameTeams} savedState={savedForGame} onNewGame={goHome}/>;
    }
    return <Game301 C={C} initialTeams={gameTeams} rule={gameRule}
      gameType={gameType} savedState={savedForGame} onNewGame={goHome}/>;
  }
  return <HomeScreen C={C} darkMode={darkMode} setDarkMode={setDarkMode}
    onShowStats={function(){setShowStats(true);}}
    onShowSettings={function(){setShowSettings(true);}}
    onSelect={function(type){setGameType(type);setScreen("setup");}}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App,null));

</script>
</body>
</html>
