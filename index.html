    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{overscroll-behavior:none}
    input,button{outline:none;font-family:Georgia,serif}
    @keyframes popIn   {0%{transform:scale(0.7);opacity:0}100%{transform:scale(1);opacity:1}}
    @keyframes burstIn {0%{transform:scale(0.5) rotate(-10deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
    @keyframes spinWin {0%{transform:rotate(0) scale(0.5)}100%{transform:rotate(720deg) scale(1)}}
    @keyframes slideUp {0%{transform:translateY(30px);opacity:0}100%{transform:translateY(0);opacity:1}}
    .pop-in  {animation:popIn   .2s ease both}
    .bust-in {animation:burstIn .3s ease both}
    .spin-win{animation:spinWin 1s  ease both}
    .slide-up{animation:slideUp .35s ease both}

    /* ── iPhone portrait : défaut ── */
    .dartboard-svg { max-width:370px }

    /* ── iPad portrait ── */
    @media (min-width:768px) and (max-width:1024px) and (orientation:portrait){
      .dartboard-svg{max-width:580px}
    }

    /* ── iPad paysage : cible occupe toute la droite ── */
    @media (min-width:1024px) and (orientation:landscape){
      .game-layout{
        flex-direction:row !important;
        align-items:stretch !important;
        overflow:hidden !important;
        padding:0 !important;
        gap:0 !important;
      }
      .game-left{
        flex:0 0 360px !important;
        overflow-y:auto !important;
        padding:12px 14px !important;
        border-right:1px solid #2a2f4a;
        gap:10px;
      }
      .game-right{
        flex:1 !important;
        display:flex !important;
        align-items:center !important;
        justify-content:center !important;
        padding:12px !important;
      }
      .dartboard-svg{
        max-width:min(calc(100vw - 400px), calc(100vh - 80px)) !important;
        width:100% !important;
      }
    }

    /* ── iPhone paysage ── */
    @media (max-height:430px) and (orientation:landscape){
      .game-layout{
        flex-direction:row !important;

      }

<script>
window.addEventListener("error", function(event) {
  if (event.message === "Script error." && !event.filename) return;
  var root = document.getElementById("root");
  if (!root) return;
  var detail = String(event.message || event.error || "Erreur inconnue");
  if (event.filename) detail += "\n" + event.filename + ":" + event.lineno + ":" + event.colno;
  root.innerHTML = "<div style='font-family:sans-serif;padding:24px;color:#b00020'>" +
    "<h1 style='font-size:18px'>Erreur de chargement</h1>" +
    "<pre style='white-space:pre-wrap'>" + detail + "</pre>" +
    "</div>";
});

/* ── Service Worker registration ── */
if ("serviceWorker" in navigator) {
  var swRefreshing = false;
  navigator.serviceWorker.addEventListener("controllerchange", function() {
    if (swRefreshing) return;
    swRefreshing = true;
    window.location.reload();
  });

  function showUpdatePrompt(worker) {
    if (document.getElementById("sw-update-prompt")) return;
    var prompt = document.createElement("div");
    prompt.id = "sw-update-prompt";
    prompt.style.cssText = "position:fixed;left:12px;right:12px;bottom:12px;z-index:1200;" +
      "background:#161928;color:#f0f2ff;border:1px solid #2a2f4a;border-radius:12px;" +
      "box-shadow:0 8px 28px #0008;padding:12px 14px;font-family:Georgia,serif;" +
      "display:flex;gap:10px;align-items:center;justify-content:space-between";
    prompt.innerHTML = "<span style='font-size:13px'>Nouvelle version disponible.</span>" +
      "<button type='button' style='background:#f5a623;color:#000;border:0;border-radius:9px;" +
      "padding:9px 12px;font-weight:bold;font-family:Georgia,serif;cursor:pointer'>Mettre a jour</button>";
    prompt.querySelector("button").addEventListener("click", function() {
      worker.postMessage({ type: "SKIP_WAITING" });
    });
    document.body.appendChild(prompt);
  }

  window.addEventListener("load", function() {
    navigator.serviceWorker.register("./sw.js").then(function(reg) {
      if (reg.waiting) showUpdatePrompt(reg.waiting);
      /* Quand un nouveau SW est en attente, on recharge pour l'activer */
      reg.addEventListener("updatefound", function() {
        var newWorker = reg.installing;
        if (newWorker) {
          newWorker.addEventListener("statechange", function() {
            if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
              /* Nouveau SW installé → reload silencieux pour appliquer le cache frais */
              showUpdatePrompt(newWorker);
            }
          });
        }
      });
    }).catch(function(err) {
      console.warn("SW registration failed:", err);
    });
  });
}
</script>

/* ══ GAME 301/501 ════════════════════════════════════════════════ */
function Game301(props){
  var initialTeams=props.initialTeams,onNewGame=props.onNewGame;
  var savedState=props.savedState,rule=props.rule,C=props.C,gameType=props.gameType||"301";
  var startScore=gameType==="501"?501:301;

  function buildInit(){
    if(savedState)return savedState;
    return{teams:initialTeams.map(function(t){return{id:t.id,name:t.name,score:startScore};}),
      currentIdx:0,throws:[],history:[],
      stats:{rounds:0,totalThrows:0,bestTurn:null},winner:null,rule:rule,gameType:gameType};
  }
  var init=buildInit();
  var effectiveRule=init.rule||rule||"simple";

  var s1=useState(init.teams);      var teams=s1[0],setTeams=s1[1];
  var s2=useState(init.currentIdx); var currentIdx=s2[0],setCurrentIdx=s2[1];
  var s3=useState(init.throws);     var throws=s3[0],setThrows=s3[1];
  var s4=useState(init.history);    var history=s4[0],setHistory=s4[1];
  var s5=useState(false);           var bust=s5[0],setBust=s5[1];
  var s6=useState(null);            var bustPend=s6[0],setBustPend=s6[1];
  var s7=useState(init.winner);     var winner=s7[0],setWinner=s7[1];
  var s8=useState(false);           var showHist=s8[0],setShowHist=s8[1];
  var s9=useState(false);           var showConf=s9[0],setShowConf=s9[1];
  var s10=useState(init.stats);     var stats=s10[0],setStats=s10[1];
  var s11=useState(false);          var showQuit=s11[0],setShowQuit=s11[1];
  var s12=useState(false);          var showStats=s12[0],setShowStats=s12[1];

  var team=teams[currentIdx];
  var roundTotal=throws.reduce(function(s,t){return s+t.score;},0);
  var projected=team.score-roundTotal;
  var boardDisabled=throws.length>=MAX_THROWS||bust;
  var canUndo=throws.length>0&&!bust;
  var turnComplete=throws.length>=MAX_THROWS&&!bust;
  var checkoutHint=projected>0&&projected<=170&&projected in CHECKOUT&&throws.length===0?CHECKOUT[projected]:null;

  useEffect(function(){
    if(!winner){
      ls_set(SAVE_KEY,{teams:teams,currentIdx:currentIdx,throws:throws,history:history,
        stats:stats,winner:null,initialTeams:initialTeams,rule:effectiveRule,gameType:gameType});
    }else{ls_del(SAVE_KEY);}
  },[teams,currentIdx,throws,history,stats,winner]);

  function isValidFinish(th){
    if(effectiveRule==="simple")return true;
    var last=th[th.length-1];
    return last&&(last.isDouble||(last.value===50&&last.multiplier===1));
  }

  function saveToHistory(w,nextTeams,nextStats){
    var teamsForHistory=nextTeams||teams;
    var statsForHistory=nextStats||stats;
    var existing=ls_get(HISTORY_KEY)||[];
    var now=new Date();
    existing.push(DartsScoring.build01GameHistoryEntry({
      date:now.toLocaleDateString("fr-FR")+" "+now.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}),
      winner:w,rule:effectiveRule,gameType:gameType,startScore:startScore,
      teams:teamsForHistory,stats:statsForHistory
    }));
    ls_set(HISTORY_KEY,existing);
  }

  function commitTurn(th,isWin){
    var result=DartsScoring.apply01Turn(teams,team.id,th);
    var total=result.total;
    var ns=result.scoreAfter;
    var nextStats=DartsScoring.next01Stats(stats,total,th.length);
    setTeams(result.teams);
    setHistory(function(h){return h.concat([{teamId:team.id,teamName:team.name,
      throws:th,total:total,bust:false,scoreBefore:team.score,scoreAfter:ns}]);});
    setStats(nextStats);
    setThrows([]);
    if(isWin){saveToHistory(team,result.teams,nextStats);setWinner(team);}
    else{setCurrentIdx(function(i){return(i+1)%teams.length;});}
  }

  function handleScore(td){
    if(throws.length>=MAX_THROWS)return;
    var nt=throws.concat([td]);
    setThrows(nt);
    var total=nt.reduce(function(s,t){return s+t.score;},0);
    var ns=team.score-total;
    if(ns<0){setBustPend(nt);setBust(true);}
    else if(ns===0){if(isValidFinish(nt)){commitTurn(nt,true);}else{setBustPend(nt);setBust(true);}}
  }

  function handleBustDone(){
    setBust(false);var bp=bustPend||[];
    var nextStats=DartsScoring.nextBustStats(stats,bp.length);
    setHistory(function(h){return h.concat([{teamId:team.id,teamName:team.name,
      throws:bp,total:0,bust:true,scoreBefore:team.score,scoreAfter:team.score}]);});
    setStats(nextStats);
    setBustPend(null);setThrows([]);
    setCurrentIdx(function(i){return(i+1)%teams.length;});
  }

  function undoLast(){if(canUndo)setThrows(function(t){return t.slice(0,t.length-1);});}
  function passTurn(){if(throws.length===0&&!bust)setCurrentIdx(function(i){return(i+1)%teams.length;});}

  function resetGame(){
    ls_del(SAVE_KEY);
    setTeams(initialTeams.map(function(t){return{id:t.id,name:t.name,score:startScore};}));
    setCurrentIdx(0);setThrows([]);setHistory([]);setWinner(null);
    setStats({rounds:0,totalThrows:0,bestTurn:null});
  }

  if(showStats)return <DartsUI.StatsScreen C={C} games={ls_get(HISTORY_KEY)||[]} teamColors={TEAM_COLORS}
    onClearHistory={function(){if(window.confirm("Effacer tout l'historique ?")){ls_del(HISTORY_KEY);setShowStats(false);}}}
    onClose={function(){setShowStats(false);}}/>;
  if(winner)return <DartsUI.WinScreen winner={winner} stats={stats} gameType={gameType} C={C}
    onRestart={function(){ls_del(SAVE_KEY);onNewGame();}}
    onNewGame={function(){ls_del(SAVE_KEY);onNewGame();}}
    onSameTeams={resetGame}/>;

  var leftContent=(
    <React.Fragment>
      <DartsUI.ScorePanel teams={teams} currentIdx={currentIdx} C={C} teamColors={TEAM_COLORS}/>
      <div style={{background:C.surface,borderRadius:13,padding:"12px 14px",border:"1px solid "+C.border}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div>
            <div style={{color:TEAM_COLORS[currentIdx],fontSize:13,fontWeight:"bold",
              letterSpacing:1,textTransform:"uppercase"}}>{team.name}</div>
            <div style={{color:C.muted,fontSize:11,marginTop:1}}>
              {"Lancer "+throws.length+"/"+MAX_THROWS}
              {turnComplete&&<span style={{color:C.accent,marginLeft:6}}>✓ Prêt à valider</span>}
            </div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{color:projected<0?C.red:projected===0?C.green:C.text,
              fontSize:26,fontWeight:"bold",fontFamily:"monospace",transition:"color 0.2s"}}>
              {projected<0?"BUST!":projected}
            </div>
            {roundTotal>0&&projected>=0&&<div style={{color:C.accent,fontSize:11}}>{"−"+roundTotal+" pts"}</div>}
          </div>
        </div>
        <DartsUI.ThrowDots throws={throws} max={MAX_THROWS} C={C}/>
        {checkoutHint&&(
          <div style={{marginTop:10,background:C.card,borderRadius:8,padding:"8px 12px",
            display:"flex",alignItems:"center",gap:8,border:"1px solid "+C.accent+"44"}}>
            <span style={{fontSize:14}}>💡</span>
            <div>
              <div style={{color:C.accent,fontSize:10,letterSpacing:1,textTransform:"uppercase"}}>Checkout suggéré</div>
              <div style={{color:C.text,fontSize:13,fontWeight:"bold",fontFamily:"monospace"}}>{checkoutHint}</div>
            </div>
          </div>
        )}
        {effectiveRule==="doubleout"&&projected>0&&projected<=40&&projected%2===0&&throws.length===MAX_THROWS-1&&(
          <div style={{marginTop:8,color:C.accent,fontSize:11,textAlign:"center",fontStyle:"italic"}}>
            {"⚠️ Double out requis — visez D"+(projected/2)}
          </div>
        )}
      </div>
      {!boardDisabled&&(
        <button onClick={function(){handleScore({value:0,multiplier:1,score:0,label:"0",isDouble:false,isBull:false});}}
          style={{width:"100%",background:C.surface,border:"1px solid "+C.border,
            borderRadius:12,padding:"11px 0",color:C.muted,fontSize:14,
            cursor:"pointer",letterSpacing:2,fontFamily:"Georgia,serif"}}>
          🎯 Raté — 0 point
        </button>
      )}
      <DartsUI.ActionButtons canUndo={canUndo} onUndo={undoLast}
        canPass={throws.length===0&&!bust} onPass={passTurn}
        turnComplete={turnComplete} onValidate={function(){if(turnComplete)setShowConf(true);}}
        C={C}/>
    </React.Fragment>
  );

  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",
      fontFamily:"Georgia,serif",paddingBottom:"env(safe-area-inset-bottom,16px)"}}>
      <div style={{background:C.headerBg,borderBottom:"1px solid "+C.border,
        padding:"12px 16px",paddingTop:"max(12px,env(safe-area-inset-top,12px))",
        display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <button onClick={function(){setShowQuit(true);}}
          style={{background:"none",border:"none",color:C.muted,fontSize:13,cursor:"pointer"}}>✕ Quitter</button>
        <button onClick={function(){setShowStats(true);}}
          style={{background:"none",border:"none",color:C.accent,fontSize:14,fontWeight:"bold",
            cursor:"pointer",letterSpacing:2}}>🎯 {gameType.toUpperCase()}</button>
        <button onClick={function(){setShowHist(true);}}
          style={{background:"none",border:"none",color:C.muted,fontSize:13,cursor:"pointer"}}>Historique</button>
      </div>
      <DartsUI.GameLayout C={C}
        leftContent={leftContent}
        boardContent={<DartsUI.DartBoard onScore={handleScore} disabled={boardDisabled} C={C}
          segments={SEGMENTS}/>}
      />
      <DartsUI.BustOverlay show={bust} onDone={handleBustDone} C={C}/>
      {showQuit&&<DartsUI.QuitModal onCancel={function(){setShowQuit(false);}} onConfirm={onNewGame} C={C}/>}
      {showConf&&<DartsUI.ConfirmModal team={team} teamIdx={currentIdx} throws={throws}
        projected={projected} C={C} teamColors={TEAM_COLORS}
        onConfirm={function(){setShowConf(false);commitTurn(throws,false);}}
        onCancel={function(){setShowConf(false);}}/>}
      {showHist&&<DartsUI.HistoryDrawer history={history} teams={teams}
        onClose={function(){setShowHist(false);}} C={C} teamColors={TEAM_COLORS}/>}
    </div>
  );
}

/* ══ GAME CRICKET ════════════════════════════════════════════════ */
function GameCricket(props){
  var initialTeams=props.initialTeams,onNewGame=props.onNewGame,savedState=props.savedState,C=props.C;

  function buildInitCricket(){
    if(savedState)return savedState;
    var cs={};
    initialTeams.forEach(function(t){
      cs[t.id]={};
      CRICKET_SECTORS.forEach(function(s){cs[t.id][s]=0;cs[t.id]["pts_"+s]=0;});
    });
    return{teams:initialTeams.map(function(t){return{id:t.id,name:t.name};}),
      currentIdx:0,throws:[],history:[],cricketState:cs,
      stats:{rounds:0,totalThrows:0,bestTurn:null},winner:null,gameType:"cricket"};
  }
  var init=buildInitCricket();

  var s1=useState(init.teams);         var teams=s1[0],setTeams=s1[1];
  var s2=useState(init.currentIdx);    var currentIdx=s2[0],setCurrentIdx=s2[1];
  var s3=useState(init.throws);        var throws=s3[0],setThrows=s3[1];
  var s4=useState(init.history);       var history=s4[0],setHistory=s4[1];
  var s5=useState(init.cricketState);  var cs=s5[0],setCs=s5[1];
  var s6=useState(init.winner);        var winner=s6[0],setWinner=s6[1];
  var s7=useState(false);              var showHist=s7[0],setShowHist=s7[1];
  var s8=useState(init.stats);         var stats=s8[0],setStats=s8[1];
  var s9=useState(false);              var showQuit=s9[0],setShowQuit=s9[1];
  var s10=useState(false);             var showStats=s10[0],setShowStats=s10[1];

  var team=teams[currentIdx];
  var boardDisabled=throws.length>=MAX_THROWS;
  var canUndo=throws.length>0;
  var turnComplete=throws.length>=MAX_THROWS;

  function teamTotalInState(state,teamId){
    return DartsScoring.teamTotalInCricketState(state,teamId);
  }
  function allClosedInState(state,teamId){
    return DartsScoring.allCricketSectorsClosed(state,teamId,CRICKET_SECTORS);
  }
  function checkWin(newCs){
    return DartsScoring.findCricketWinner(newCs,teams,CRICKET_SECTORS);
  }

  useEffect(function(){
    if(!winner){
      ls_set(SAVE_KEY,{teams:teams,currentIdx:currentIdx,throws:throws,history:history,
        cricketState:cs,stats:stats,winner:null,initialTeams:initialTeams,gameType:"cricket"});
    }else{ls_del(SAVE_KEY);}
  },[teams,currentIdx,throws,history,cs,stats,winner]);

  function handleScore(td){
    if(throws.length>=MAX_THROWS)return;
    setThrows(throws.concat([td]));
  }

  function commitCricketTurn(th){
    var newCs=DartsScoring.applyCricketTurn(cs,teams,team.id,CRICKET_SECTORS,th);
    var nextStats={rounds:stats.rounds+1,totalThrows:stats.totalThrows+th.length,bestTurn:stats.bestTurn};
    setCs(newCs);
    setHistory(function(h){return h.concat([{teamId:team.id,teamName:team.name,throws:th,total:0,bust:false}]);});
    setStats(nextStats);
    setThrows([]);
    var w=checkWin(newCs);
    if(w){
      var existing=ls_get(HISTORY_KEY)||[];
      var now=new Date();
      existing.push({
        date:now.toLocaleDateString("fr-FR")+" "+now.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}),
        winner:w.name,gameType:"cricket",totalThrows:nextStats.totalThrows,
        teams:teams.map(function(t){return{name:t.name,score:teamTotalInState(newCs,t.id)};})
      });
      ls_set(HISTORY_KEY,existing);
      setWinner(w);
    }else{setCurrentIdx(function(i){return(i+1)%teams.length;});}
  }

  function undoLast(){if(canUndo)setThrows(function(t){return t.slice(0,t.length-1);});}
  function passTurn(){if(throws.length===0)setCurrentIdx(function(i){return(i+1)%teams.length;});}

  function resetGame(){
    ls_del(SAVE_KEY);
    var newCs={};
    initialTeams.forEach(function(t){
      newCs[t.id]={};
      CRICKET_SECTORS.forEach(function(s){newCs[t.id][s]=0;newCs[t.id]["pts_"+s]=0;});
    });
    setTeams(initialTeams.map(function(t){return{id:t.id,name:t.name};}));
    setCs(newCs);setCurrentIdx(0);setThrows([]);setHistory([]);setWinner(null);
    setStats({rounds:0,totalThrows:0,bestTurn:null});
  }

  if(showStats)return <DartsUI.StatsScreen C={C} games={ls_get(HISTORY_KEY)||[]} teamColors={TEAM_COLORS}
    onClearHistory={function(){if(window.confirm("Effacer tout l'historique ?")){ls_del(HISTORY_KEY);setShowStats(false);}}}
    onClose={function(){setShowStats(false);}}/>;
  if(winner)return <DartsUI.WinScreen winner={winner} stats={stats} gameType="cricket" C={C}
    onRestart={function(){ls_del(SAVE_KEY);onNewGame();}}
    onNewGame={function(){ls_del(SAVE_KEY);onNewGame();}}
    onSameTeams={resetGame}/>;

  var openSectors=CRICKET_SECTORS.filter(function(s){return(cs[team.id][s]||0)<3;});

  var leftContent=(
    <React.Fragment>
      <DartsUI.CricketPanel teams={teams} currentIdx={currentIdx} cricketState={cs} C={C}
        teamColors={TEAM_COLORS} cricketSectors={CRICKET_SECTORS}/>
      <div style={{background:C.surface,borderRadius:13,padding:"10px 14px",border:"1px solid "+C.border}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div>
            <div style={{color:TEAM_COLORS[currentIdx],fontSize:13,fontWeight:"bold",
              letterSpacing:1,textTransform:"uppercase"}}>{team.name}</div>
            <div style={{color:C.muted,fontSize:11,marginTop:1}}>
              {"Lancer "+throws.length+"/"+MAX_THROWS}
              {turnComplete&&<span style={{color:C.accent,marginLeft:6}}>✓ Prêt à valider</span>}
            </div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{color:C.text,fontSize:13,fontFamily:"monospace"}}>
              {openSectors.length===0?"Tous fermés !":openSectors.map(function(s){return s===25?"Bull":s;}).join(" · ")}
            </div>
            <div style={{color:C.muted,fontSize:10}}>à fermer</div>
          </div>
        </div>
        <DartsUI.ThrowDots throws={throws} max={MAX_THROWS} C={C}/>
      </div>
      {!boardDisabled&&(
        <button onClick={function(){handleScore({value:0,multiplier:1,score:0,label:"0",isDouble:false,isBull:false});}}
          style={{width:"100%",background:C.surface,border:"1px solid "+C.border,
            borderRadius:12,padding:"11px 0",color:C.muted,fontSize:14,
            cursor:"pointer",letterSpacing:2,fontFamily:"Georgia,serif"}}>
          🎯 Raté — 0 point
        </button>
      )}
      <DartsUI.ActionButtons canUndo={canUndo} onUndo={undoLast}
        canPass={throws.length===0} onPass={passTurn}
        turnComplete={turnComplete} onValidate={function(){if(turnComplete)commitCricketTurn(throws);}}
        C={C}/>
    </React.Fragment>
  );

  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",
      fontFamily:"Georgia,serif",paddingBottom:"env(safe-area-inset-bottom,16px)"}}>
      <div style={{background:C.headerBg,borderBottom:"1px solid "+C.border,
        padding:"12px 16px",paddingTop:"max(12px,env(safe-area-inset-top,12px))",
        display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <button onClick={function(){setShowQuit(true);}}
          style={{background:"none",border:"none",color:C.muted,fontSize:13,cursor:"pointer"}}>✕ Quitter</button>
        <button onClick={function(){setShowStats(true);}}
          style={{background:"none",border:"none",color:C.accent,fontSize:14,fontWeight:"bold",cursor:"pointer",letterSpacing:2}}>
          🏏 CRICKET
        </button>
        <button onClick={function(){setShowHist(true);}}
          style={{background:"none",border:"none",color:C.muted,fontSize:13,cursor:"pointer"}}>Historique</button>
      </div>
      <DartsUI.GameLayout C={C}
        leftContent={leftContent}
        boardContent={<DartsUI.DartBoard onScore={handleScore} disabled={boardDisabled} C={C}
          segments={SEGMENTS} highlightSectors={openSectors.length>0?CRICKET_SECTORS:null}/>}
      />
      {showQuit&&<DartsUI.QuitModal onCancel={function(){setShowQuit(false);}} onConfirm={onNewGame} C={C}/>}
      {showHist&&<DartsUI.HistoryDrawer history={history} teams={teams}
        onClose={function(){setShowHist(false);}} C={C} teamColors={TEAM_COLORS}/>}
    </div>
  );
}

/* ══ APP ROOT ════════════════════════════════════════════════════ */
function App(){
  var saved=ls_get(SAVE_KEY);
  var isDark=ls_get(THEME_KEY);
  if(isDark===null)isDark=true;

  var b1=useState(saved?"resume":"home"); var screen=b1[0],setScreen=b1[1];
  var b2=useState(null);                  var gameTeams=b2[0],setGameTeams=b2[1];
  var b3=useState(saved);                 var savedSt=b3[0],setSavedSt=b3[1];
  var b4=useState(null);                  var gameRule=b4[0],setGameRule=b4[1];
  var b5=useState(!!isDark);              var darkMode=b5[0],setDarkMode=b5[1];
  var b6=useState(null);                  var gameType=b6[0],setGameType=b6[1];
  var b7=useState(false);                 var showStats=b7[0],setShowStats=b7[1];
  var b8=useState(false);                 var showSettings=b8[0],setShowSettings=b8[1];

  var C=makeTheme(darkMode);
  useEffect(function(){document.body.style.background=C.bg;},[darkMode]);

  function goHome(){ls_del(SAVE_KEY);setSavedSt(null);setGameTeams(null);setScreen("home");}

  if(showStats)return <DartsUI.StatsScreen C={C} games={ls_get(HISTORY_KEY)||[]} teamColors={TEAM_COLORS}
    onClearHistory={function(){if(window.confirm("Effacer tout l'historique ?")){ls_del(HISTORY_KEY);setShowStats(false);}}}
    onClose={function(){setShowStats(false);}}/>;
  if(showSettings)return <DartsUI.SettingsScreen C={C} darkMode={darkMode} version={APP_VERSION}
    onSetDarkMode={function(value){setDarkMode(value);ls_set(THEME_KEY,value);}}
    onClearHistory={function(){if(window.confirm("Effacer tout l'historique des parties ?"))ls_del(HISTORY_KEY);}}
    onClearSave={function(){if(window.confirm("Annuler la partie en cours sauvegardée ?"))ls_del(SAVE_KEY);}}
    onClose={function(){setShowSettings(false);}}/>;

  if(screen==="resume"&&savedSt){
    return <DartsUI.ResumeScreen C={C} saved={savedSt} teamColors={TEAM_COLORS}
      onResume={function(){
        setGameTeams(savedSt.initialTeams||savedSt.teams.map(function(t){return{id:t.id,name:t.name};}));
        setGameRule(savedSt.rule||"simple");
        setGameType(savedSt.gameType||"301");
        setScreen("game");
      }}
      onNewGame={function(){ls_del(SAVE_KEY);setSavedSt(null);setScreen("home");}}/>;
  }
  if(screen==="home"){
    return <DartsUI.HomeScreen C={C} darkMode={darkMode}
      onShowStats={function(){setShowStats(true);}}
      onShowSettings={function(){setShowSettings(true);}}
      onToggleTheme={function(){setDarkMode(!darkMode);ls_set(THEME_KEY,!darkMode);}}
      onSelect={function(type){setGameType(type);setScreen("setup");}}/>;
  }
  if(screen==="setup"){
    return <DartsUI.SetupScreen C={C} gameType={gameType}
      initialTeams={ls_get(TEAMS_KEY)||[{id:1,name:"Equipe Rouge"},{id:2,name:"Equipe Bleue"}]}
      teamColors={TEAM_COLORS}
      onSaveTeams={function(teams){ls_set(TEAMS_KEY,teams);}}
      onBack={function(){setScreen("home");}}
      onStart={function(teams,rule){
        ls_del(SAVE_KEY);setSavedSt(null);
        setGameTeams(teams);setGameRule(rule);setScreen("game");
      }}/>;
  }
  if(screen==="game"&&gameTeams){
    var savedForGame=savedSt&&savedSt.gameType===(gameType||"301")?savedSt:null;
    if(gameType==="cricket"){
      return <GameCricket C={C} initialTeams={gameTeams} savedState={savedForGame} onNewGame={goHome}/>;
    }
    return <Game301 C={C} initialTeams={gameTeams} rule={gameRule}
      gameType={gameType} savedState={savedForGame} onNewGame={goHome}/>;
  }
  return <DartsUI.HomeScreen C={C} darkMode={darkMode}
    onShowStats={function(){setShowStats(true);}}
    onShowSettings={function(){setShowSettings(true);}}
    onToggleTheme={function(){setDarkMode(!darkMode);ls_set(THEME_KEY,!darkMode);}}
    onSelect={function(type){setGameType(type);setScreen("setup");}}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App,null));

</script>
</body>
</html>
